[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && cd dashboard && npm install && npm run build && cd .."

[deploy]
startCommand = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[variables]
PYTHONUNBUFFERED = "1"
