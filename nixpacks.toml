[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "nodejs_20"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "cd dashboard && npm install && cd .."
]

[phases.build]
cmds = [
  "cd dashboard && npm run build && cd .."
]

[start]
cmd = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
